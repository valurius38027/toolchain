name: UltraRender Debian 13 SDK

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ultrarender-debian13-release.yml"
      - "profiles/ultrarender/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ultrarender-debian13-release.yml"
      - "profiles/ultrarender/**"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the VERSION release after all restore gates pass
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ultrarender-sdk-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PROFILE_DIR: profiles/ultrarender
  BUNDLE_NAME: ultrarender-dev-sdk-debian13-amd64
  BUILD_ARTIFACT: ultrarender-sdk-build-${{ github.run_id }}
  VERIFY_ARTIFACT: ultrarender-sdk-verification-${{ github.run_id }}

jobs:
  lint:
    name: Validate profile sources
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Validate scripts, manifest and version
        shell: bash
        run: |
          set -euo pipefail
          scripts=(
            "$PROFILE_DIR/scripts/lib/common.sh"
            "$PROFILE_DIR/scripts/build-offline-repo.sh"
            "$PROFILE_DIR/scripts/package-release.sh"
            "$PROFILE_DIR/scripts/install-offline.sh"
            "$PROFILE_DIR/scripts/verify-installed.sh"
            "$PROFILE_DIR/scripts/restore.sh"
          )
          bash -n "${scripts[@]}"
          shellcheck "${scripts[@]}"

          awk '{ sub(/[[:space:]]*#.*/, "") } NF { print $1 }' \
            "$PROFILE_DIR/packages.txt" > /tmp/ultrarender-packages
          test -s /tmp/ultrarender-packages
          test -z "$(sort /tmp/ultrarender-packages | uniq -d)"

          version=$(tr -d '[:space:]' < "$PROFILE_DIR/VERSION")
          [[ $version =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]+$ ]]
          grep -q 'Qt6::GuiPrivate' "$PROFILE_DIR/smoke/CMakeLists.txt"
          grep -q '<rhi/qrhi.h>' "$PROFILE_DIR/smoke/main.cpp"

  build:
    name: Build deterministic offline SDK
    needs: lint
    runs-on: ubuntu-latest
    container:
      image: debian:13
    steps:
      - name: Install packaging bootstrap
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            dpkg-dev \
            git \
            gzip \
            jq \
            zstd

      - name: Check out source with Git metadata
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Build complete package closure and archive
        shell: bash
        run: |
          set -euo pipefail
          export LANG=C.UTF-8
          export LC_ALL=C.UTF-8
          export SOURCE_DATE_EPOCH
          SOURCE_DATE_EPOCH=$(git -c safe.directory="$GITHUB_WORKSPACE" show -s --format=%ct "$GITHUB_SHA")
          chmod +x "$PROFILE_DIR"/scripts/*.sh "$PROFILE_DIR"/scripts/lib/*.sh
          bash "$PROFILE_DIR/scripts/build-offline-repo.sh"
          bash "$PROFILE_DIR/scripts/package-release.sh"

      - name: Audit generated assets
        shell: bash
        run: |
          set -euo pipefail
          out=out/ultrarender
          version=$(tr -d '[:space:]' < "$PROFILE_DIR/VERSION")
          test -s "$out/$BUNDLE_NAME.tar.zst"
          test -s "$out/$BUNDLE_NAME.tar.zst.sha256"
          test -s "$out/ultrarender-package-lock.tsv"
          test -s "$out/ultrarender-build-metadata.json"
          zstd --test "$out/$BUNDLE_NAME.tar.zst"
          (cd "$out" && sha256sum -c "$BUNDLE_NAME.tar.zst.sha256")
          jq -e \
            --arg version "$version" \
            --arg commit "$GITHUB_SHA" \
            '.profile == "ultrarender" and .profile_version == $version and .target == "debian-13-amd64" and .commit_sha == $commit and .package_count > 0' \
            "$out/ultrarender-build-metadata.json"

      - name: Upload build assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: |
            out/ultrarender/${{ env.BUNDLE_NAME }}.tar.zst
            out/ultrarender/${{ env.BUNDLE_NAME }}.tar.zst.sha256
            out/ultrarender/ultrarender-package-lock.tsv
            out/ultrarender/ultrarender-build-metadata.json
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

  restore:
    name: Restore without external APT sources
    needs: build
    runs-on: ubuntu-latest
    container:
      image: debian:13
    steps:
      - name: Install extraction bootstrap
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates zstd

      - name: Download build assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: artifact

      - name: Verify and extract archive
        shell: bash
        run: |
          set -euo pipefail
          cd artifact
          sha256sum -c "$BUNDLE_NAME.tar.zst.sha256"
          zstd --test "$BUNDLE_NAME.tar.zst"
          tar --zstd -xf "$BUNDLE_NAME.tar.zst"

      - name: Remove external package sources
        shell: bash
        run: |
          set -euo pipefail
          rm -f /etc/apt/sources.list
          rm -rf /etc/apt/sources.list.d/*
          rm -rf /var/lib/apt/lists/*

      - name: Install solely from the bundled repository
        shell: bash
        run: |
          set -euo pipefail
          bash "artifact/$BUNDLE_NAME/scripts/install-offline.sh"

      - name: Run compiler, QRhi and Vulkan gates
        shell: bash
        env:
          VERIFICATION_REPORT: ${{ github.workspace }}/artifact/ultrarender-verification-report.txt
          VERIFY_WORK_DIR: ${{ github.workspace }}/artifact/verification-work
        run: |
          set -euo pipefail
          bash "artifact/$BUNDLE_NAME/scripts/verify-installed.sh"
          grep -qx 'VERIFICATION_RESULT=PASS' "$VERIFICATION_REPORT"

      - name: Upload verification report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ env.VERIFY_ARTIFACT }}
          path: artifact/ultrarender-verification-report.txt
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish immutable SDK Release
    needs: restore
    if: >-
      ${{
        needs.restore.result == 'success' &&
        (
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.publish)
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download build assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: release-input

      - name: Download verification report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.VERIFY_ARTIFACT }}
          path: release-input

      - name: Resolve immutable release tag
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version=$(tr -d '[:space:]' < "$PROFILE_DIR/VERSION")
          [[ $version =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]+$ ]]
          tag="ultrarender-sdk-debian13-v$version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Bump profiles/ultrarender/VERSION before publishing." >&2
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists. Bump profiles/ultrarender/VERSION before changing the profile." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Audit publication inputs
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          cd release-input
          required=(
            "$BUNDLE_NAME.tar.zst"
            "$BUNDLE_NAME.tar.zst.sha256"
            ultrarender-package-lock.tsv
            ultrarender-build-metadata.json
            ultrarender-verification-report.txt
          )
          for asset in "${required[@]}"; do
            test -s "$asset" || { echo "Missing or empty asset: $asset" >&2; exit 1; }
          done
          sha256sum -c "$BUNDLE_NAME.tar.zst.sha256"
          grep -qx 'VERIFICATION_RESULT=PASS' ultrarender-verification-report.txt
          jq -e \
            --arg version "$VERSION" \
            --arg commit "$GITHUB_SHA" \
            '.profile_version == $version and .commit_sha == $commit and .target == "debian-13-amd64"' \
            ultrarender-build-metadata.json

      - name: Create, round-trip verify and publish Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          # UltraRender Debian 13 Development SDK

          Immutable Debian 13 amd64 SDK built from commit \`$GITHUB_SHA\`.

          The release passed clean-container offline installation, bundle-integrity and required-package lock verification, GCC and Clang QRhi smoke builds, Lavapipe Vulkan enumeration, and remote archive checksum verification.

          Restore with:

          \`sudo bash profiles/ultrarender/scripts/restore.sh $TAG\`
          EOF

          gh release create "$TAG" \
            release-input/"$BUNDLE_NAME.tar.zst" \
            release-input/"$BUNDLE_NAME.tar.zst.sha256" \
            release-input/ultrarender-package-lock.tsv \
            release-input/ultrarender-build-metadata.json \
            release-input/ultrarender-verification-report.txt \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --latest=false \
            --draft

          release_json=$(gh api --method GET "repos/$GITHUB_REPOSITORY/releases" -f per_page=100)
          release_id=$(jq -er --arg tag "$TAG" \
            '.[] | select(.tag_name == $tag and .draft == true) | .id' <<< "$release_json" | head -n 1)
          [[ $release_id =~ ^[0-9]+$ ]] || { echo "Draft release ID not found for $TAG" >&2; exit 1; }

          cleanup() {
            status=$?
            if [[ $status -ne 0 ]]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$release_id" >/dev/null 2>&1 || true
              if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
                git push origin ":refs/tags/$TAG" >/dev/null 2>&1 || true
              fi
            fi
            exit "$status"
          }
          trap cleanup EXIT

          release_json=$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id")
          for asset in \
            "$BUNDLE_NAME.tar.zst" \
            "$BUNDLE_NAME.tar.zst.sha256" \
            ultrarender-package-lock.tsv \
            ultrarender-build-metadata.json \
            ultrarender-verification-report.txt; do
            size=$(jq -er --arg asset "$asset" '.assets[] | select(.name == $asset) | .size' <<< "$release_json")
            asset_id=$(jq -er --arg asset "$asset" '.assets[] | select(.name == $asset) | .id' <<< "$release_json")
            [[ $size -gt 0 ]] || { echo "Remote asset is missing or empty: $asset" >&2; exit 1; }
            [[ $asset_id =~ ^[0-9]+$ ]] || { echo "Remote asset ID is invalid: $asset" >&2; exit 1; }
          done

          mkdir -p remote-roundtrip
          for asset in \
            "$BUNDLE_NAME.tar.zst" \
            "$BUNDLE_NAME.tar.zst.sha256" \
            ultrarender-build-metadata.json; do
            asset_id=$(jq -er --arg asset "$asset" '.assets[] | select(.name == $asset) | .id' <<< "$release_json")
            gh api \
              -H 'Accept: application/octet-stream' \
              "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
              > "remote-roundtrip/$asset"
            test -s "remote-roundtrip/$asset"
          done
          (cd remote-roundtrip && sha256sum -c "$BUNDLE_NAME.tar.zst.sha256")
          jq -e --arg commit "$GITHUB_SHA" '.commit_sha == $commit' \
            remote-roundtrip/ultrarender-build-metadata.json

          jq -n '{draft: false, make_latest: "false"}' > publish-release.json
          published_json=$(gh api \
            --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            --input publish-release.json)
          [[ $(jq -r '.draft' <<< "$published_json") == false ]]
          [[ $(jq -r '.tag_name' <<< "$published_json") == "$TAG" ]]
          [[ $(jq -r '.assets | length' <<< "$published_json") -eq 5 ]]

          trap - EXIT
