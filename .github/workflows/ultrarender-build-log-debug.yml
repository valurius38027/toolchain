name: UltraRender Build Log Diagnostics

on:
  push:
    branches:
      - "feat/ultrarender-sdk-release"
    paths:
      - ".github/workflows/ultrarender-build-log-debug.yml"

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o job-logs.zip \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/jobs/88431150025/logs"
          unzip -p job-logs.zip | tail -n 140 > build-log-tail.txt

      - name: Report diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### UltraRender build failure log tail'
            echo '```text'
            cat build-log-tail.txt
            echo '```'
          } > build-log-comment.md
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file build-log-comment.md
