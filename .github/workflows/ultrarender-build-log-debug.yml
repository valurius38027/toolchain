name: UltraRender Build Log Diagnostics

on:
  push:
    branches:
      - "feat/ultrarender-sdk-release"
    paths:
      - ".github/workflows/ultrarender-build-log-debug.yml"

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o job.log \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/jobs/88431150025/logs"
          {
            echo '=== matched failure lines ==='
            grep -Ein -C 3 'error|fatal|failed|failure|not found|no such|invalid|cannot|unable' job.log | tail -n 60 || true
            echo
            echo '=== final 25 lines ==='
            tail -n 25 job.log
          } > build-log-diagnostic.txt

      - name: Replace diagnostics comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### UltraRender concise build failure diagnostic'
            echo '```text'
            cat build-log-diagnostic.txt
            echo '```'
          } > build-log-comment.md
          jq -Rs '{body: .}' build-log-comment.md > payload.json
          gh api \
            --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5025479996" \
            --input payload.json >/dev/null
