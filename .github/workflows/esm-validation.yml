name: ESM experimental validity validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out validation carrier
        uses: actions/checkout@v4

      - name: Run bounded validation pipeline
        shell: bash
        run: bash esm-validation/run-validation.sh

      - name: Publish validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esm-validation-results
          path: /tmp/validation-results
          if-no-files-found: error
