name: ESM experimental validity validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out validation carrier
        uses: actions/checkout@v4

      - name: Reconstruct ESM source tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/esm-src
          cat esm-validation/source.part* | base64 --decode > /tmp/esm-source.tar.gz
          gzip --test /tmp/esm-source.tar.gz
          tar -xzf /tmp/esm-source.tar.gz -C /tmp/esm-src
          test -f /tmp/esm-src/Cargo.toml
          find /tmp/esm-src -maxdepth 3 -type f | sort

      - name: Record Rust versions
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s rustc --version
          timeout 110s cargo --version

      - name: Fetch dependencies
        working-directory: /tmp/esm-src
        shell: bash
        run: timeout 110s cargo fetch --locked

      - name: Check formatting
        working-directory: /tmp/esm-src
        shell: bash
        run: timeout 110s cargo fmt --all -- --check

      - name: Compile library and binaries
        working-directory: /tmp/esm-src
        shell: bash
        run: timeout 110s cargo check --all-targets --locked

      - name: Run data and metadata tests
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo test --locked --test induction_data -- --nocapture
          timeout 110s cargo test --locked --test lm_forward_metadata -- --nocapture
          timeout 110s cargo test --locked --test gradient_test_support -- --nocapture
          timeout 110s cargo test --locked --test optimizer_partition -- --nocapture

      - name: Run operator gradient tests
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo test --locked --test attention_ops_grad_check -- --nocapture
          timeout 110s cargo test --locked --test lm_ops_grad_check -- --nocapture

      - name: Run model gradient tests
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo test --locked --test baseline_grad_check -- --nocapture
          timeout 110s cargo test --locked --test grad_check -- --nocapture
          timeout 110s cargo test --locked --test lm_grad_check -- --nocapture

      - name: Build validation binaries
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo build --release --locked --bin validated_induction
          timeout 110s cargo build --release --locked --bin context_baselines
          timeout 110s cargo build --release --locked --bin v10_separate_optimizer

      - name: Run short induction validation shards
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p results
          ESM_STEPS=8 ESM_BATCH=2 ESM_SEED_START=0 ESM_SEED_COUNT=1 \
            ESM_OUTPUT=results/induction_seed_0.csv \
            timeout 110s ./target/release/validated_induction \
            2>results/induction_seed_0_summary.txt
          ESM_STEPS=8 ESM_BATCH=2 ESM_SEED_START=1 ESM_SEED_COUNT=1 \
            ESM_OUTPUT=results/induction_seed_1.csv \
            timeout 110s ./target/release/validated_induction \
            2>results/induction_seed_1_summary.txt

      - name: Run short context baseline validation
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          ESM_EPOCHS=1 ESM_SENTENCES=30 ESM_HOLDOUT_SENTENCES=12 ESM_SEED=42 \
            timeout 110s ./target/release/context_baselines \
            >results/context_baselines.csv \
            2>results/context_baselines_summary.txt

      - name: Publish validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esm-validation-results
          path: /tmp/esm-src/results
          if-no-files-found: warn
