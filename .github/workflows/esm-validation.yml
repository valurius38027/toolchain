name: ESM experimental validity validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out validation carrier
        uses: actions/checkout@v4

      - name: Reconstruct and patch ESM source tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/esm-src /tmp/validation-results
          cat esm-validation/source.part* | base64 --decode > /tmp/esm-source.tar.gz
          gzip --test /tmp/esm-source.tar.gz
          tar -xzf /tmp/esm-source.tar.gz -C /tmp/esm-src
          test -f /tmp/esm-src/Cargo.toml
          cat esm-validation/latest.part* > /tmp/esm-latest.patch
          echo 'c5ffbacefda9a42f5946fd5e90d3de6dcba4ae24d672b4ef14b0a57ab8c4ea1d  /tmp/esm-latest.patch' | sha256sum -c -
          git -C /tmp/esm-src apply --check /tmp/esm-latest.patch
          git -C /tmp/esm-src apply /tmp/esm-latest.patch
          cp esm-validation/model_invariants.rs /tmp/esm-src/tests/model_invariants.rs
          find /tmp/esm-src -maxdepth 3 -type f | sort > /tmp/validation-results/source-manifest.txt

      - name: Record Rust versions
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          {
            timeout 110s rustc --version
            timeout 110s cargo --version
          } 2>&1 | tee /tmp/validation-results/rust-versions.log

      - name: Fetch dependencies
        working-directory: /tmp/esm-src
        shell: bash
        run: timeout 110s cargo fetch --locked 2>&1 | tee /tmp/validation-results/cargo-fetch.log

      - name: Format source and archive canonical tree
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo fmt --all 2>&1 | tee /tmp/validation-results/cargo-fmt.log
          timeout 110s cargo fmt --all -- --check 2>&1 | tee -a /tmp/validation-results/cargo-fmt.log
          tar --exclude=target --exclude=results -czf /tmp/validation-results/formatted-source.tar.gz .

      - name: Compile library and binaries
        working-directory: /tmp/esm-src
        shell: bash
        run: timeout 110s cargo check --all-targets --locked 2>&1 | tee /tmp/validation-results/cargo-check.log

      - name: Run data and metadata tests
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo test --locked --test induction_data -- --nocapture 2>&1 | tee /tmp/validation-results/test-induction-data.log
          timeout 110s cargo test --locked --test corpus_split -- --nocapture 2>&1 | tee /tmp/validation-results/test-corpus-split.log
          timeout 110s cargo test --locked --test lm_forward_metadata -- --nocapture 2>&1 | tee /tmp/validation-results/test-lm-forward-metadata.log
          timeout 110s cargo test --locked --test model_invariants -- --nocapture 2>&1 | tee /tmp/validation-results/test-model-invariants.log
          timeout 110s cargo test --locked --test gradient_test_support -- --nocapture 2>&1 | tee /tmp/validation-results/test-gradient-support.log
          timeout 110s cargo test --locked --test optimizer_partition -- --nocapture 2>&1 | tee /tmp/validation-results/test-optimizer-partition.log

      - name: Run operator gradient tests
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo test --locked --test attention_ops_grad_check -- --nocapture 2>&1 | tee /tmp/validation-results/test-attention-ops.log
          timeout 110s cargo test --locked --test lm_ops_grad_check -- --nocapture 2>&1 | tee /tmp/validation-results/test-lm-ops.log

      - name: Run model gradient tests
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo test --locked --test baseline_grad_check -- --nocapture 2>&1 | tee /tmp/validation-results/test-baseline-grad.log
          timeout 110s cargo test --locked --test grad_check -- --nocapture 2>&1 | tee /tmp/validation-results/test-model-grad.log
          timeout 110s cargo test --locked --test lm_grad_check -- --nocapture 2>&1 | tee /tmp/validation-results/test-lm-grad.log

      - name: Build validation binaries
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          timeout 110s cargo build --release --locked --bin validated_induction 2>&1 | tee /tmp/validation-results/build-validated-induction.log
          timeout 110s cargo build --release --locked --bin context_baselines 2>&1 | tee /tmp/validation-results/build-context-baselines.log
          timeout 110s cargo build --release --locked --bin v10_separate_optimizer 2>&1 | tee /tmp/validation-results/build-v10.log

      - name: Run short induction validation shards
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          ESM_STEPS=8 ESM_BATCH=2 ESM_EVAL_SAMPLES=16 ESM_SEED_START=0 ESM_SEED_COUNT=1 \
            ESM_OUTPUT=/tmp/validation-results/induction_seed_0.csv \
            timeout 110s ./target/release/validated_induction \
            2>/tmp/validation-results/induction_seed_0_summary.txt
          ESM_STEPS=8 ESM_BATCH=2 ESM_EVAL_SAMPLES=16 ESM_SEED_START=1 ESM_SEED_COUNT=1 \
            ESM_OUTPUT=/tmp/validation-results/induction_seed_1.csv \
            timeout 110s ./target/release/validated_induction \
            2>/tmp/validation-results/induction_seed_1_summary.txt

      - name: Run short context baseline validation
        working-directory: /tmp/esm-src
        shell: bash
        run: |
          set -euo pipefail
          ESM_EPOCHS=1 ESM_SENTENCES=30 ESM_HOLDOUT_SENTENCES=12 ESM_SEED_START=42 ESM_SEED_COUNT=1 \
            timeout 110s ./target/release/context_baselines \
            >/tmp/validation-results/context_baselines.csv \
            2>/tmp/validation-results/context_baselines_summary.txt

      - name: Publish validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esm-validation-results
          path: /tmp/validation-results
          if-no-files-found: error
