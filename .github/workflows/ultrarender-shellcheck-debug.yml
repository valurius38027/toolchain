name: UltraRender ShellCheck Diagnostics

on:
  push:
    branches:
      - "feat/ultrarender-sdk-release"
    paths:
      - ".github/workflows/ultrarender-shellcheck-debug.yml"
      - "profiles/ultrarender/scripts/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
      - name: Capture report
        shell: bash
        run: |
          set +e
          shellcheck profiles/ultrarender/scripts/lib/common.sh profiles/ultrarender/scripts/*.sh > shellcheck-report.txt 2>&1
          cat shellcheck-report.txt
          exit 0
      - name: Report diagnostics
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### ShellCheck diagnostic report'
            echo '```text'
            cat shellcheck-report.txt
            echo '```'
          } > shellcheck-comment.md
          gh pr comment 5 --repo "$GITHUB_REPOSITORY" --body-file shellcheck-comment.md
