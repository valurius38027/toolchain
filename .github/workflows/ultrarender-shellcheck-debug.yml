name: UltraRender ShellCheck Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ultrarender-shellcheck-debug.yml"
      - "profiles/ultrarender/scripts/**"

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
      - name: Capture report
        shell: bash
        run: |
          set +e
          shellcheck profiles/ultrarender/scripts/lib/common.sh profiles/ultrarender/scripts/*.sh > shellcheck-report.txt 2>&1
          cat shellcheck-report.txt
          exit 0
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ultrarender-shellcheck-report-${{ github.run_id }}
          path: shellcheck-report.txt
          if-no-files-found: error
          retention-days: 1
