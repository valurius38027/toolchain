name: UltraRender SDK Status Probe

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  report:
    if: >-
      github.event.comment.body == '/sdk-status' ||
      startsWith(github.event.comment.body, '/sdk-diagnose ')
    runs-on: ubuntu-latest
    steps:
      - name: Report or diagnose UltraRender SDK runs
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          COMMAND: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          if [[ $COMMAND == '/sdk-status' ]]; then
            runs=$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ultrarender-debian13-release.yml/runs?branch=main&per_page=5")
            {
              echo '## UltraRender SDK workflow status'
              echo
              echo '| Run | Commit | Status | Conclusion | Event |'
              echo '| ---: | --- | --- | --- | --- |'
              jq -r '.workflow_runs[] | "| [\(.id)](\(.html_url)) | `\(.head_sha)` | \(.status) | \(.conclusion // "-") | \(.event) |"' <<< "$runs"
              latest=$(jq -r '.workflow_runs[0].id // empty' <<< "$runs")
              if [[ -n $latest ]]; then
                echo
                echo '### Latest jobs'
                echo
                echo '| Job | Status | Conclusion |'
                echo '| --- | --- | --- |'
                gh api "repos/$GITHUB_REPOSITORY/actions/runs/$latest/jobs?per_page=100" \
                  --jq '.jobs[] | "| \(.name) | \(.status) | \(.conclusion // "-") |"'
              fi
            } > /tmp/status.md
            gh issue comment "$ISSUE" --repo "$GITHUB_REPOSITORY" --body-file /tmp/status.md
            exit 0
          fi

          run_id=${COMMAND#'/sdk-diagnose '}
          [[ $run_id =~ ^[0-9]+$ ]]
          jobs=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100")
          job_id=$(jq -er '.jobs[] | select(.conclusion == "failure") | .id' <<< "$jobs" | head -n 1)
          job_name=$(jq -er --argjson id "$job_id" '.jobs[] | select(.id == $id) | .name' <<< "$jobs")
          raw=/tmp/job.raw
          text=/tmp/job.txt
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$job_id/logs" > "$raw"
          if unzip -tqq "$raw" >/dev/null 2>&1; then
            unzip -p "$raw" > "$text"
          else
            cp "$raw" "$text"
          fi
          {
            printf '## UltraRender SDK diagnostic: run `%s`\n\n' "$run_id"
            printf -- '- Failed job: `%s` (`%s`)\n\n' "$job_name" "$job_id"
            echo '```text'
            grep -Eai -B 8 -A 30 'error:|failed|failure|not found|missing|qsb|shader|freetype|harfbuzz|ctest' "$text" \
              | tail -n 260 || tail -n 220 "$text"
            echo '```'
          } > /tmp/diagnostic.md
          gh issue comment "$ISSUE" --repo "$GITHUB_REPOSITORY" --body-file /tmp/diagnostic.md
