name: Verify UltraRender Restore Command

on:
  push:
    branches:
      - verify/ultrarender-restore-command
    paths:
      - .github/workflows/verify-ultrarender-restore-command.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  restore-command:
    runs-on: ubuntu-latest
    container:
      image: debian:13
    timeout-minutes: 20
    steps:
      - name: Check out published main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: main

      - name: Execute full public restore and verification path
        shell: bash
        run: |
          set -euo pipefail
          cache=/tmp/ultrarender-sdk-cache
          bash profiles/ultrarender/scripts/restore.sh latest \
            --cache-dir "$cache"

          current_tag=$(cat "$cache/current")
          [[ $current_tag == ultrarender-sdk-debian13-v2026.07.20.1 ]]
          local_report="$cache/$current_tag/local-verification-report.txt"
          grep -qx 'VERIFICATION_RESULT=PASS' "$local_report"

          extracted="$cache/$current_tag/extracted/ultrarender-dev-sdk-debian13-amd64"
          test -d "$extracted"
          test -s "$extracted/ultrarender-package-lock.tsv"
          test -s "$extracted/ultrarender-build-metadata.json"
          test -x "$extracted/scripts/install-offline.sh"
          test -x "$extracted/scripts/verify-installed.sh"

          printf 'resolved_tag=%s\nlocal_verification_report=%s\nextracted_bundle=%s\nFULL_RESTORE_COMMAND_RESULT=PASS\n' \
            "$current_tag" "$local_report" "$extracted" \
            > /tmp/restore-command-report.txt
          cat /tmp/restore-command-report.txt

      - name: Report result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: "5025479996"
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          command -v curl >/dev/null 2>&1 || {
            apt-get update
            apt-get install -y --no-install-recommends curl ca-certificates
          }
          command -v jq >/dev/null 2>&1 || {
            apt-get update
            apt-get install -y --no-install-recommends jq
          }
          if [[ -f /tmp/restore-command-report.txt ]] && \
             grep -qx 'FULL_RESTORE_COMMAND_RESULT=PASS' /tmp/restore-command-report.txt; then
            title='### UltraRender full public restore command verification: PASS'
          else
            title='### UltraRender full public restore command verification: FAIL'
          fi
          {
            echo "$title"
            echo
            echo '```text'
            if [[ -f /tmp/restore-command-report.txt ]]; then
              cat /tmp/restore-command-report.txt
            else
              echo 'full restore command did not produce a success report'
            fi
            echo '```'
          } > /tmp/comment.md
          jq -Rs '{body: .}' /tmp/comment.md > /tmp/payload.json
          curl -fsSL \
            -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            --data-binary @/tmp/payload.json \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" \
            >/dev/null
