name: Verify Published UltraRender SDK

on:
  push:
    branches:
      - feat/ultrarender-sdk-release
    paths:
      - .github/workflows/ultrarender-main-release-verify.yml

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Report publish failure context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: "5025479996"
          JOB_ID: "88438840699"
        run: |
          set -euo pipefail
          curl -fL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -o publish-job.log \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/jobs/$JOB_ID/logs"
          {
            echo '### UltraRender publish job failure tail'
            echo
            echo '```text'
            tail -n 90 publish-job.log
            echo '```'
          } > report.md
          jq -Rs '{body: .}' report.md > payload.json
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" \
            --input payload.json >/dev/null
